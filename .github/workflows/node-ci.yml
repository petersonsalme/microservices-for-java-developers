name: Node.js CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16.x'
        cache: 'npm'
        cache-dependency-path: 'node-backend/package-lock.json'
        
    - name: Install dependencies
      run: |
        cd node-backend
        npm ci
        
    - name: Run npm audit
      run: |
        cd node-backend
        npm audit || true
